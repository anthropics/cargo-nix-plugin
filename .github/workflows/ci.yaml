name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      # Ubuntu 24.04 ships kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks the nested user namespace chroot-store-test needs for
      # its inner `nix build --store local?root=...`.
      - if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main 2026-05-27
        with:
          # Most checks evaluate and build with a nested nix inside the
          # test derivation, which requires recursive-nix.
          extra-conf: |
            extra-experimental-features = recursive-nix
            extra-system-features = recursive-nix
      - run: nix flake check -L
